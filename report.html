<!DOCTYPE html>
<html>
<head>
    <style>
        body { font-family: Arial, sans-serif; line-height: 1.6; color: #333; }
        .header { text-align: center; padding: 20px; background: #f4f4f4; }
        .content { padding: 20px; }
        .trend { background: #eef; padding: 10px; margin: 10px 0; border-radius: 5px; }
        .footer { font-size: 0.8em; text-align: center; margin-top: 30px; color: #777; }
    </style>
</head>
<body>
    <div class="header">
        <h1>Global Software Intelligence Report</h1>
        <p>Prepared for: {{customer_email}} | Date: {{date}}</p>
    </div>
    <div class="content">
        <h2>Top Software Trends</h2>
        {{trend_data}}
        <h2>Key Metrics</h2>
        {{metrics_data}}
    </div>
    <div class="footer">
        <p>© 2026 Autonomous Data Refinery. Data is for informational purposes only.</p>
    </div>
</body>
</html>
