name: Autonomous Market Report

on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository Tree
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Configure Python Infrastructure
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Verify Subscriber Ledger Status
        run: |
          if [ ! -f subscribers.json ]; then
            echo "[]" > subscribers.json
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add subscribers.json
            git commit -m "system: auto-initialize empty subscribers database array"
            git push
          fi

      - name: Build System Package Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install google-genai resend ccxt requests

      - name: Run Core Orchestrator Loop
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 llm_analyst_bot.py
