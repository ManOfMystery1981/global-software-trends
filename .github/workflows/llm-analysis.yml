# .github/workflows/llm-analysis.yml
name: LLM Tech Analyst - Automated Report Generation

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      email:
        description: 'Recipient email address (leave blank for webhook mode)'
        required: false
        default: ''
      test_mode:
        description: 'Run in test mode (no email sent)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'
      send_test_copy:
        description: 'Send a test copy to dsull1981@gmail.com (for testing only)'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  generate-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Install Ollama
        run: |
          pkill -f ollama || true
          sleep 2
          curl -fsSL https://ollama.com/install.sh | sh
          ollama serve &
          sleep 10
          ollama pull tinyllama:latest
          ollama list

      - name: Run LLM Analyst Bot
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CUSTOMER_EMAIL: ${{ github.event.inputs.email || '' }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
          LLM_API_URL: "http://localhost:11434/api/generate"
          LLM_MODEL: "tinyllama:latest"
        run: |
          python llm_analyst_bot.py

      - name: Generate Full PDF Report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CUSTOMER_EMAIL: ${{ github.event.inputs.email || '' }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
          SEND_TEST_COPY: ${{ github.event.inputs.send_test_copy || 'false' }}
        run: |
          EMAIL_TO_SEND="$CUSTOMER_EMAIL"
          
          # If send_test_copy is enabled, send to dsull1981@gmail.com
          if [ "$SEND_TEST_COPY" == "true" ]; then
            EMAIL_TO_SEND="dsull1981@gmail.com"
            echo "🧪 Test copy enabled: Sending to $EMAIL_TO_SEND"
          fi
          
          if [ -n "$EMAIL_TO_SEND" ]; then
            echo "📧 Sending report to: $EMAIL_TO_SEND"
            python delivery_bot.py $EMAIL_TO_SEND $([ "$TEST_MODE" == "true" ] && echo "--test")
          else
            echo "⚠️ No email provided. Skipping email delivery. Report available as artifact."
          fi

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-reports
          path: |
            analyst_article_*.md
            Global_Software_Trends_Report.pdf
            market_intelligence.md
          retention-days: 30
