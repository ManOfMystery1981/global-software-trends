# .github/workflows/llm-analysis.yml
name: LLM Tech Analyst - Automated Report Generation

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      email:
        description: 'Send report to this email'
        required: false
        default: ''
      test_mode:
        description: 'Run in test mode'
        required: false
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

jobs:
  generate-analysis:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install requests reportlab matplotlib beautifulsoup4 lxml resend

      - name: Install Ollama
        uses: pydantic/ollama-action@v3
        with:
          model: qwen2:0.5b

      - name: Run LLM Analyst Bot
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CUSTOMER_EMAIL: ${{ github.event.inputs.email || 'dsull1981@gmail.com' }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: |
          python llm_analyst_bot.py

      - name: Generate Full PDF Report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          CUSTOMER_EMAIL: ${{ github.event.inputs.email || 'dsull1981@gmail.com' }}
          TEST_MODE: ${{ github.event.inputs.test_mode || 'false' }}
        run: |
          python delivery_bot.py $CUSTOMER_EMAIL $([ "$TEST_MODE" == "true" ] && echo "--test")

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: generated-reports
          path: |
            analyst_article_*.md
            Global_Software_Trends_Report.pdf
            market_intelligence.md
          retention-days: 30
