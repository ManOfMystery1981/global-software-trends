name: Autonomous Data Refinery Core

on:
  schedule:
    - cron: '0 0 * * *'       # Daily Cron
  repository_dispatch:
    types: [payment_received] # Payment Webhook
  workflow_dispatch:          # Manual UI Trigger
    inputs:
      email:
        description: 'Recipient email (if manual)'
        required: false
      mode:
        description: 'Mode'
        required: true
        default: 'production'
        type: choice
        options: ['production', 'sample']

jobs:
  refine:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Environment
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          sudo apt-get update && sudo apt-get install -y libpango-1.0-0 libpangocairo-1.0-0
          pip install -r requirements.txt

      - name: Run Core Engine
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          # Logic to handle dynamic input from Cron vs Webhook vs Manual
          CUSTOMER_EMAIL: ${{ github.event.client_payload.email || github.event.inputs.email }}
        run: python llm_analyst_bot.py

      - name: Upload Report
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: autonomous-report
          path: reports/*.pdf
          retention-days: 1
