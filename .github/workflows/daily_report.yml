name: Autonomous Market Report
on:
  schedule:
    - cron: '0 8 1 * *'
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with: {fetch-depth: 0}
      - name: Set Up Python
        uses: actions/setup-python@v5
        with: {python-version: '3.10'}
      - name: Verify Subscriber Ledger
        run: |
          if [ ! -f subscribers.json ]; then
            echo "[]" > subscribers.json
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git add subscribers.json
            git commit -m "Initialize subscriber ledger"
            git push
          fi
      - name: Install Dependencies
        run: pip install google-genai resend ccxt requests
      - name: Execute Orchestrator
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: python3 llm_analyst_bot.py
