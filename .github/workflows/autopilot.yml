name: Autonomous Market Intelligence Factory Autopilot

on:
  schedule:
    # Triggers the execution pass automatically every single day at 09:00 UTC
    - cron: '0 9 * * *'
  workflow_dispatch:
    # Allows you to manually trigger the data product execution pass from the GitHub UI

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest
    
    steps:
    - name: Ingest Compliance Architecture Core
      uses: actions/checkout@v4

    - name: Initialize Secure Python Runtime Environment
      uses: actions/setup-python@v5
      with:
        python-version: '3.14'
        cache: 'pip'

    - name: Bind Core Operational System Dependencies
      run: |
        python -m pip install --upgrade pip
        if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
        # Ensure Flask, Stripe, and Supabase dependencies are completely present
        pip install flask stripe supabase python-dotenv

    - name: Run Deterministic Multi-Factor Regression Tests
      run: python3 -m unittest tests/test_reproducibility.py

    - name: Run Advanced Billing and Entitlement Boundary Tests
      run: python3 -m unittest tests/test_billing_gateway.py

    - name: Execute Autonomous Market Intelligence Factory Master Loop
      env:
        # Securely maps your infrastructure variables straight into the cloud runner
        RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
        STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      run: python3 llm_analyst_bot.py
