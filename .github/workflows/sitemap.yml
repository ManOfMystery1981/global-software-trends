name: Autonomous SEO Sitemap Update

on:
  push:
    branches:
      - main 
  workflow_dispatch: 

jobs:
  generate-sitemap:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Required to allow the bot to commit the sitemap
    steps:
      - name: Checkout Code Base
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate Dynamic Sitemap Matrix
        uses: cicirello/generate-sitemap@v1
        with:
          # Update this URL to match your actual GitHub Pages site
          # Replace 'your-username' and 'Global-Software-Intelligence-Matrix'
          base-url-path: https://your-username.github.io/Global-Software-Intelligence-Matrix/
          drop-html-extension: true
          include-pdf: false

      - name: Push Compiled Sitemap To Repository Root
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          
          if git status --porcelain | grep -q "sitemap.xml"; then
            git add sitemap.xml
            git commit -m "seo: automated sitemap catalog refresh"
            git push
            echo "Fresh sitemap.xml successfully deployed to production root."
          else
            echo "Sitemap matches current catalog profile. Skipping push."
          fi
